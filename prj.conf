# =============================================================================
# BOOTLOADER AND FLASH
# =============================================================================
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y

# Disable QSPI to avoid JEDEC ID errors
CONFIG_NORDIC_QSPI_NOR=n

# =============================================================================
# MCUMGR CORE
# =============================================================================
CONFIG_MCUMGR=y
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_BASE64=y

# MCUMGR command groups
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_GRP_OS_TASKSTAT=y
CONFIG_MCUMGR_GRP_OS_MCUMGR_PARAMS=y
CONFIG_MCUMGR_GRP_STAT=y
CONFIG_MCUMGR_GRP_FS=y
CONFIG_MCUMGR_GRP_ZBASIC=y
CONFIG_MCUMGR_GRP_ZBASIC_STORAGE_ERASE=y

# =============================================================================
# MCUMGR TRANSPORT - BLUETOOTH
# =============================================================================
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_TRANSPORT_BT_AUTHEN=n
CONFIG_MCUMGR_TRANSPORT_BT_CONN_PARAM_CONTROL=y
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=2475
CONFIG_MCUMGR_TRANSPORT_WORKQUEUE_STACK_SIZE=4608

# =============================================================================
# MCUMGR TRANSPORT - UART/USB
# =============================================================================
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y
CONFIG_CONSOLE=y



# =============================================================================
# BLUETOOTH
# =============================================================================
CONFIG_BT=y
CONFIG_BT_DEVICE_NAME="Marcelo"
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_MAX_CONN=2

# Bluetooth data packet optimization
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_BUF_ACL_RX_SIZE=502
CONFIG_BT_BUF_ACL_TX_SIZE=502
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_CTLR_LE_PING=n

# =============================================================================
# FILE SYSTEM
# =============================================================================
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y

# =============================================================================
# MONITORING AND STATISTICS
# =============================================================================
CONFIG_IMG_MANAGER=y
CONFIG_THREAD_MONITOR=y
CONFIG_STATS=y
CONFIG_STATS_NAMES=y

# =============================================================================
# SYSTEM STACK SIZES
# =============================================================================
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2304
CONFIG_MAIN_STACK_SIZE=2048

# =============================================================================
# LOGGING AND DEBUG
# =============================================================================
CONFIG_LOG=y
# Reduce log level to remove Bluetooth info messages
# 0=OFF, 1=ERR, 2=WRN, 3=INF, 4=DBG
CONFIG_LOG_MAX_LEVEL=1
CONFIG_BOOT_BANNER=n
# Alternative: Disable specific log modules
# CONFIG_LOG_MODE_MINIMAL=y

# =============================================================================
# APPLICATION - CUSTOM CONFIGURATIONS
# =============================================================================
# Time window for double reset detection (default: 2000ms)
CONFIG_DOUBLE_RESET_WINDOW_MS=2000

# LED blink period during DFU mode (default: 100ms = 5Hz)
CONFIG_DFU_LED_BLINK_PERIOD_MS=100

# Delay before calling the real main() (default: 12000ms = 12s)
CONFIG_MAIN_WRAPPER_DELAY_MS=2000
