name: Build MCUboot — nRF52840 Pro Micro

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: project

      # Zephyr SDK меняется редко — кэшируем отдельно
      - name: Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk
          key: zephyr-sdk-0.16.5-1

      # NCS кэшируем по версии
      - name: Cache NCS
        id: cache-ncs
        uses: actions/cache@v4
        with:
          path: ~/ncs
          key: ncs-v2.6.1-${{ runner.os }}

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            git cmake ninja-build gperf ccache wget \
            python3-pip python3-setuptools python3-wheel \
            device-tree-compiler xz-utils file libmagic1
          pip3 install --user west

      - name: Install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.5-1/zephyr-sdk-0.16.5-1_linux-x86_64_minimal.tar.xz \
            -O /tmp/zephyr-sdk.tar.xz
          mkdir -p ~/zephyr-sdk
          tar xf /tmp/zephyr-sdk.tar.xz -C ~/zephyr-sdk --strip-components=1
          ~/zephyr-sdk/setup.sh -t arm-zephyr-eabi -h -c

      - name: Register Zephyr SDK (from cache)
        if: steps.cache-sdk.outputs.cache-hit == 'true'
        run: ~/zephyr-sdk/setup.sh -t arm-zephyr-eabi -h -c

      - name: Init NCS
        if: steps.cache-ncs.outputs.cache-hit != 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p ~/ncs
          cd ~/ncs
          west init -m https://github.com/nrfconnect/sdk-nrf --mr v2.6.1
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Install Python requirements
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          pip3 install --user \
            -r ~/ncs/zephyr/scripts/requirements.txt \
            -r ~/ncs/nrf/scripts/requirements.txt \
            -r ~/ncs/bootloader/mcuboot/scripts/requirements.txt

      - name: Build MCUboot via sysbuild
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export ZEPHYR_BASE=~/ncs/zephyr
          export ZEPHYR_SDK_INSTALL_DIR=~/zephyr-sdk

          # Запускаем из ~/ncs — именно так делает оригинальный репозиторий:
          # west build -b promicro_nrf52840 --sysbuild --pristine -- -DBOARD_ROOT=$PWD
          # $PWD там = корень репо, где лежит boards/promicro_nrf52840/
          cd ~/ncs

          west build \
            -b promicro_nrf52840 \
            -d build/mcuboot \
            --sysbuild \
            -p always \
            bootloader/mcuboot/boot/zephyr \
            -- \
            -DBOARD_ROOT=${{ github.workspace }}/project

      - name: Find and collect artifacts
        run: |
          echo "=== build tree (hex files) ==="
          find ~/ncs/build/mcuboot -name "*.hex" | sort

          mkdir -p artifacts

          # sysbuild кладёт MCUboot в build/mcuboot/mcuboot/zephyr/
          HEX=$(find ~/ncs/build/mcuboot -name "zephyr.hex" | head -1)
          if [ -n "$HEX" ]; then
            cp "$HEX" artifacts/mcuboot.hex
            echo "Copied: $HEX"
          else
            echo "ERROR: zephyr.hex not found"
            exit 1
          fi

          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcuboot-promicro-nrf52840-${{ github.sha }}
          path: artifacts/
          retention-days: 30
