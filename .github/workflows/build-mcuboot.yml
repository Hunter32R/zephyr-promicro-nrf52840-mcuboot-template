name: Build MCUboot for nRF52840 Pro Micro

on:
  push:
    branches: [main, master]
    paths:
      - 'boards/**'
      - 'mcuboot/**'
      - '.github/workflows/build-mcuboot.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      ncs_version:
        description: 'nRF Connect SDK version'
        required: false
        default: 'v2.6.1'

env:
  NCS_VERSION: ${{ github.event.inputs.ncs_version || 'v2.6.1' }}
  # Имя платы должно совпадать с именем папки в boards/ вашего репозитория
  BOARD: my_promicro_nrf52840
  BUILD_DIR: build/mcuboot

jobs:
  build-mcuboot:
    name: Build MCUboot bootloader
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Чекаутим в папку project — она будет BOARD_ROOT для west
          path: project

      # Кэшируем NCS (~10 ГБ) и Zephyr SDK отдельно:
      # NCS меняется только при смене версии, SDK — крайне редко.
      - name: Cache Zephyr SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: ~/.local/share/zephyr-sdk
          key: zephyr-sdk-0.16.5-1-${{ runner.os }}

      - name: Cache nRF Connect SDK
        uses: actions/cache@v4
        id: ncs-cache
        with:
          path: ncs
          key: ncs-${{ env.NCS_VERSION }}-${{ runner.os }}
          restore-keys: |
            ncs-${{ env.NCS_VERSION }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            git cmake ninja-build gperf ccache \
            dfu-util device-tree-compiler wget \
            python3-dev python3-pip python3-setuptools \
            python3-wheel xz-utils file \
            make gcc libsdl2-dev libmagic1

      - name: Install west
        run: pip3 install --user west

      - name: Set up Zephyr SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          SDK_VERSION="0.16.5-1"
          SDK_URL="https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VERSION}"
          SDK_FILE="zephyr-sdk-${SDK_VERSION}_linux-x86_64_minimal.tar.xz"
          mkdir -p ~/.local/share/zephyr-sdk
          wget -q "${SDK_URL}/${SDK_FILE}" -O /tmp/zephyr-sdk.tar.xz
          tar xf /tmp/zephyr-sdk.tar.xz -C ~/.local/share/zephyr-sdk --strip-components=1
          ~/.local/share/zephyr-sdk/setup.sh -t arm-zephyr-eabi -h -c

      - name: Register Zephyr SDK (from cache)
        if: steps.sdk-cache.outputs.cache-hit == 'true'
        run: ~/.local/share/zephyr-sdk/setup.sh -t arm-zephyr-eabi -h -c

      - name: Initialize nRF Connect SDK
        if: steps.ncs-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p ncs
          cd ncs
          west init -m https://github.com/nrfconnect/sdk-nrf --mr ${{ env.NCS_VERSION }}
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Install Python requirements from NCS
        run: |
          pip3 install --user \
            -r ncs/zephyr/scripts/requirements.txt \
            -r ncs/nrf/scripts/requirements.txt \
            -r ncs/bootloader/mcuboot/scripts/requirements.txt

      - name: Build MCUboot
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export ZEPHYR_BASE=$PWD/ncs/zephyr
          export ZEPHYR_SDK_INSTALL_DIR=~/.local/share/zephyr-sdk

          cd ncs

          west build \
            -b ${{ env.BOARD }} \
            -d ${{ env.BUILD_DIR }} \
            --pristine \
            bootloader/mcuboot/boot/zephyr \
            -- \
            -DBOARD_ROOT=${{ github.workspace }}/project \
            -DCONFIG_BOOT_SWAP_USING_MOVE=y \
            -DCONFIG_BOOT_MAX_IMG_SECTORS=256 \
            -DCONFIG_BOOT_UPGRADE_ONLY=n \
            -DCONFIG_MCUBOOT_LOG_LEVEL_INF=y

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp ncs/${{ env.BUILD_DIR }}/zephyr/zephyr.hex artifacts/mcuboot.hex
          cp ncs/${{ env.BUILD_DIR }}/zephyr/zephyr.bin artifacts/mcuboot.bin 2>/dev/null || true
          echo "=== Artifacts ==="
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcuboot-${{ env.BOARD }}-${{ github.sha }}
          path: artifacts/
          retention-days: 30

      - name: Build summary
        run: |
          echo "### MCUboot build" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in artifacts/*; do
            echo "| $(basename $f) | $(du -h $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Board:** \`${{ env.BOARD }}\`  " >> $GITHUB_STEP_SUMMARY
          echo "**NCS:** \`${{ env.NCS_VERSION }}\`  " >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
