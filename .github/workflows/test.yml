name: nRF52840 MCUboot BLE OTA build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            git cmake ninja-build gperf \
            ccache dfu-util wget python3 python3-pip python3-setuptools \
            xz-utils file make gcc gcc-multilib \
            device-tree-compiler

      - name: Install west
        run: |
          pip3 install west

      - name: Initialize Zephyr workspace
        run: |
          mkdir zephyrproject
          cd zephyrproject
          west init -m https://github.com/zephyrproject-rtos/zephyr --mr main
          west update
          west zephyr-export
          pip3 install -r zephyr/scripts/requirements.txt

      # -------------------------
      # Build MCUboot bootloader
      # -------------------------
      - name: Build MCUboot
        run: |
          cd zephyrproject
          west build -b nrf52840dk_nrf52840 \
            bootloader/mcuboot/boot/zephyr \
            -p always \
            -d build-mcuboot

      # -------------------------
      # Build BLE OTA application
      # -------------------------
      - name: Build SMP BLE DFU app
        run: |
          cd zephyrproject
          west build -b nrf52840dk_nrf52840 \
            zephyr/samples/subsys/mgmt/mcumgr/smp_svr \
            -p always \
            -d build-app

      # -------------------------
      # Collect artifacts
      # -------------------------
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts

          cp zephyrproject/build-mcuboot/zephyr/zephyr.hex artifacts/mcuboot.hex
          cp zephyrproject/build-mcuboot/zephyr/zephyr.bin artifacts/mcuboot.bin

          cp zephyrproject/build-app/zephyr/zephyr.hex artifacts/app.hex
          cp zephyrproject/build-app/zephyr/zephyr.bin artifacts/app.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nrf52840-mcuboot-ota
          path: artifacts
