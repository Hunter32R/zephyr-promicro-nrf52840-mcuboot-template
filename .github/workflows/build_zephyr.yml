name: Build Zephyr ProMicro nRF52840 (MCUboot)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr
      ZEPHYR_SDK_INSTALL_DIR: /opt/zephyr-sdk
      BOARD: promicro_nrf52840/nrf52840

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git cmake ninja-build gperf \
            dfu-util device-tree-compiler \
            wget python3 python3-pip python3-setuptools \
            python3-wheel python3-dev xz-utils file make gcc

      - name: Install Python tools
        run: |
          pip3 install --user west pyelftools imgtool

      - name: Install Zephyr SDK
        run: |
          wget https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.5/zephyr-sdk-0.16.5_linux-x86_64.tar.xz
          tar xf zephyr-sdk-0.16.5_linux-x86_64.tar.xz
          sudo mv zephyr-sdk-0.16.5 /opt/zephyr-sdk
          sudo /opt/zephyr-sdk/setup.sh -t all -h

      - name: Set environment
        run: |
          echo "ZEPHYR_SDK_INSTALL_DIR=/opt/zephyr-sdk" >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake -B build \
            -DBOARD=${BOARD} \
            -S .

      - name: Build
        run: |
          cmake --build build

      - name: Sign firmware (MCUboot)
        run: |
          if [ -f build/zephyr/zephyr.bin ]; then
            imgtool sign \
              --key mcuboot/root-rsa-2048.pem \
              --header-size 0x200 \
              --align 8 \
              --version 1.0.0 \
              --slot-size 0x74000 \
              build/zephyr/zephyr.bin \
              build/zephyr/zephyr.signed.bin || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/zephyr/zephyr.bin
            build/zephyr/zephyr.hex
            build/zephyr/zephyr.elf
            build/zephyr/zephyr.signed.bin
