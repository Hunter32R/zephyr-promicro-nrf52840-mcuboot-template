name: Build Zephyr Firmware

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr
      ZEPHYR_SDK_INSTALL_DIR: /opt/zephyr-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git cmake ninja-build gperf \
            ccache dfu-util device-tree-compiler wget \
            python3-dev python3-pip python3-setuptools python3-wheel xz-utils file make gcc gcc-multilib

      - name: Install west
        run: pip3 install --user west

      - name: Install Python deps
        run: pip3 install --user -r zephyr/scripts/requirements.txt

      - name: Install Zephyr SDK
        run: |
          wget https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.5/zephyr-sdk-0.16.5_linux-x86_64.tar.xz
          tar xf zephyr-sdk-0.16.5_linux-x86_64.tar.xz
          sudo mv zephyr-sdk-0.16.5 /opt/zephyr-sdk
          sudo /opt/zephyr-sdk/setup.sh -t all -h

      - name: Build (sysbuild with MCUboot)
        run: |
          west build -p always -b promicro_nrf52840/nrf52840 \
            --sysbuild app

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/zephyr/zephyr.hex
            build/zephyr/zephyr.bin
            build/mcuboot/zephyr/zephyr.hex
