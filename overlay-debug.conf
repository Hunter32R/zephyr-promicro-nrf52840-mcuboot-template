# Essencial para identificar threads
CONFIG_THREAD_NAME=y

# Desabilita funcionalidades desnecessárias para reduzir tamanho
CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_MONITOR=n
CONFIG_MCUMGR_GRP_OS_TASKSTAT=n
CONFIG_MCUMGR_GRP_STAT=n
CONFIG_STATS=n
CONFIG_STATS_NAMES=n

# Stack protection mínimo
CONFIG_STACK_CANARIES=y

# Debug mínimo essencial para o crash
CONFIG_DEBUG_INFO=y
# CONFIG_EXCEPTION_STACK_TRACE=y
CONFIG_FAULT_DUMP=2



# Reduz verbosidade para economizar espaço
CONFIG_LOG_MAX_LEVEL=2

# Força stack trace mais verboso
CONFIG_EXCEPTION_STACK_TRACE=y
CONFIG_FAULT_DUMP=2
CONFIG_DEBUG_INFO=y

# Adiciona estas linhas para garantir stack trace:
CONFIG_THREAD_STACK_INFO=y
CONFIG_SYMTAB=y
CONFIG_KERNEL_LOG_LEVEL_ERR=y

# Debug para ver exatamente quando comandos chegam
CONFIG_BT_SMP_LOG_LEVEL_DBG=y

# Debug específico do grupo OS
CONFIG_MCUMGR_GRP_OS_LOG_LEVEL_DBG=y

# Aumenta o log para ver o processamento do echo
CONFIG_LOG_MAX_LEVEL=4
# Enable logging
CONFIG_LOG=y
CONFIG_MCUBOOT_UTIL_LOG_LEVEL_WRN=y